# Codemagic: https://docs.codemagic.io/yaml-code-signing/signing-ios/
#
# ПЕШ АЗ BUILD дар веби Codemagic:
# 1) Team settings → Integrations → Developer Portal → API key (App Store Connect .p8, Issuer ID, Key ID)
# 2) codemagic.yaml settings → Code signing identities:
#    - Apple Distribution certificate (ё Generate бо ҳамон API key)
#    - Provisioning profile намуди App Store барои tj.manzilho.app (Fetch аз портал)
# 3) Хатти integrations.app_store_connect-ро бо НОМИ ДОҚИҚИ калид дар Codemagic иваз кунед.

workflows:
  ios-workflow:
    name: Manzilho iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic ASC Key
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: tj.manzilho.app
    scripts:
      - name: Pub get
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios && pod install
      - name: Apply provisioning profiles to Xcode
        script: xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Build IPA
        script: flutter build ipa
    artifacts:
      - build/ios/ipa/*.ipa

  android-workflow:
    name: Manzilho Android
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      flutter: stable
    scripts:
      - name: Pub get
        script: flutter pub get
      - name: Build App Bundle
        script: flutter build appbundle
    artifacts:
      - build/app/outputs/**/*.aab
